<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Muse Studio — Personal OS</title>
<meta name="description" content="The Muse Studio - Um estúdio digital para organizar a sua vida">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:;">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="referrer" content="strict-origin-when-cross-origin">
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js" integrity="sha512-H+rglffZ6f5gF7UJgvH4Naa+fGCgjrHKMgoFOGmcPTRwR6oILo5R+gtzNrpDp7iMV3udbymBVjkeZGNz1Em4rQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <h1>The Muse Studio</h1>
  <p>workspace pessoal</p>
  <div class="splash-line"></div>
</div>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">✦</div>
    <div class="sidebar-brand"><h2>The Muse Studio</h2><p>workspace pessoal</p></div>
    <button class="sidebar-close" id="sidebarClose" data-action="closeSidebar"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>
  <div id="sidebarContent"></div>
</nav>

<!-- WIDGET PICKER MODAL -->
<div class="modal-overlay" id="widgetModal">
  <div class="modal-content">
    <div class="modal-title">Adicionar uma nova visualização</div>
    <div class="widget-grid" id="widgetGrid"></div>
    <div class="modal-datasource" id="newDatasource">⊕ Nova fonte de dados</div>
  </div>
</div>

<!-- ACCORDION DETAIL MODAL -->
<div class="acc-detail-overlay" id="accDetailOverlay">
  <div class="acc-detail-modal">
    <div class="acc-detail-top">
      <div class="acc-detail-cat" id="accDetailCat"></div>
      <div class="acc-detail-title" id="accDetailTitle"></div>
      <button class="acc-detail-close" data-action="closeAccDetail"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="acc-detail-body">
      <div class="acc-detail-label">
        <span>CONTEÚDO</span>
        <button class="small-btn" data-action="renameAccItemFromModal" style="font-size:0.6rem;padding:2px 6px">Renomear item</button>
      </div>
      <div class="acc-detail-content" id="accDetailContent" contenteditable="true" data-placeholder="Clique para adicionar conteúdo a esta subpágina..."></div>
    </div>
    <div class="acc-detail-footer">
      <button class="small-btn" data-action="closeAccDetail">Cancelar</button>
      <button class="small-btn accent" data-action="saveAndCloseAccDetail">Salvar</button>
    </div>
  </div>
</div>

<!-- MENU RECIPE MODAL (Notepad) -->
<div class="acc-detail-overlay" id="menuRecipeOverlay">
  <div class="acc-detail-modal">
    <div class="acc-detail-top">
      <div class="acc-detail-cat" id="menuRecipeMealLabel"></div>
      <div class="acc-detail-title" id="menuRecipeDayLabel"></div>
      <button class="acc-detail-close" data-action="closeMenuRecipe"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="acc-detail-body">
      <div class="acc-detail-label">NOME DA REFEIÇÃO</div>
      <input class="inline-input" id="menuRecipeTitle" placeholder="Ex: Arroz com Feijão e Frango" style="margin-bottom: 20px; font-weight: 600;">
      
      <div class="acc-detail-label">
        <span>RECEITA / NOTAS</span>
        <button class="small-btn" data-action="insertLinkMenuRecipe" style="font-size:0.6rem;padding:2px 6px">Inserir Link</button>
      </div>
      <div class="acc-detail-content" id="menuRecipeContent" contenteditable="true" data-placeholder="Escreva a receita ou notas aqui... (Suporta links clicáveis)"></div>
    </div>
    <div class="acc-detail-footer">
      <button class="small-btn" data-action="closeMenuRecipe">Cancelar</button>
      <button class="small-btn accent" data-action="saveMenuRecipe">Salvar</button>
    </div>
  </div>
</div>

<!-- GENERIC MODAL (replaces prompt/confirm) -->
<div class="muse-modal-overlay" id="museModalOverlay">
  <div class="muse-modal">
    <h3 id="museModalTitle"></h3>
    <div class="muse-modal-msg" id="museModalMsg" style="display:none"></div>
    <input class="inline-input muse-modal-input" id="museModalInput" style="display:none" placeholder="">
    <div class="muse-modal-btns">
      <button class="small-btn" id="museModalCancel" data-action="museModalCancel">Cancelar</button>
      <button class="small-btn accent" id="museModalOk" data-action="museModalOk">OK</button>
    </div>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div class="bottom-sheet" id="bottomSheetOverlay">
  <div class="bottom-sheet-content" id="bottomSheetContent"></div>
</div>

<!-- LIGHTBOX OVERLAY -->
<div class="modal-overlay" id="lightboxOverlay" data-action="closeLightbox">
  <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:20px">
    <img id="lightboxImg" src="" style="max-width:100%;max-height:100%;border-radius:10px;box-shadow:var(--shadow-lg);object-fit:contain">
    <button class="icon-btn" style="position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.5);color:#fff" data-action="closeLightbox">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="app-header">
    <button class="icon-btn" id="menuBtn" data-action="openSidebar"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <h1>The Muse Studio</h1>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggle" data-action="toggleTheme"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg></button>
    </div>
  </header>
  <main id="mainContent"></main>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottomNav"></nav>

<script src="app.js"></script>
<script src="widgets.js"></script>
</body>
</html>
