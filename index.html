<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Muse Studio — Personal OS</title>
<meta name="description" content="The Muse Studio - Um estúdio digital para organizar a sua vida">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0b;--bg2:#111113;--card:#161618;--card2:#1c1c1f;--border:#2a2a2e;--border2:#333338;
  --text:#e8e6e3;--text2:#9a9a9f;--text3:#6a6a6f;
  --accent:#d4a853;--accent2:#e8c47a;--accent-bg:rgba(212,168,83,.12);
  --danger:#e05555;--success:#4caf84;
  --radius:14px;--radius-lg:20px;--radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,.4);--shadow-lg:0 8px 40px rgba(0,0,0,.6);
  --glass:rgba(22,22,24,.85);--glass-border:rgba(255,255,255,.06);
  --nav-h:64px;--header-h:56px;
  --font-title:'Playfair Display',Georgia,serif;--font-body:'Inter',-apple-system,sans-serif;
  --transition:cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg:#f4f2ef;--bg2:#eae7e2;--card:#ffffff;--card2:#f8f6f3;--border:#e0ddd8;--border2:#d0cdc8;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --accent:#b8892e;--accent2:#d4a853;--accent-bg:rgba(184,137,46,.1);
  --glass:rgba(255,255,255,.9);--glass-border:rgba(0,0,0,.06);
  --shadow:0 4px 24px rgba(0,0,0,.08);--shadow-lg:0 8px 40px rgba(0,0,0,.12);
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .4s var(--transition),color .4s var(--transition)}
h1,h2,h3{font-family:var(--font-title);font-weight:600;letter-spacing:.02em}
a{color:inherit;text-decoration:none}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea{font-family:var(--font-body);background:none;border:none;color:var(--text);outline:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease,visibility .8s ease}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
#splash h1{font-family:var(--font-title);font-size:2rem;letter-spacing:.35em;text-transform:uppercase;color:var(--text);opacity:0;animation:fadeUp .8s .3s forwards}
#splash p{font-size:.85rem;color:var(--text3);letter-spacing:.15em;margin-top:8px;opacity:0;animation:fadeUp .8s .6s forwards}
#splash .splash-line{width:40px;height:1px;background:var(--accent);margin-top:20px;opacity:0;animation:fadeUp .8s .9s forwards}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideInRight{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes scaleIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}

/* APP SHELL */
#app{opacity:0;transition:opacity .5s ease;padding-bottom:calc(var(--nav-h) + 16px)}
#app.show{opacity:1}

/* HEADER */
.app-header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border)}
.app-header h1{font-size:.8rem;letter-spacing:.3em;text-transform:uppercase;font-weight:500}
.header-actions{display:flex;gap:8px;align-items:center}
.icon-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .25s,transform .2s}
.icon-btn:hover{background:var(--card2);transform:scale(1.05)}
.icon-btn:active{transform:scale(.95)}
.icon-btn svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* HERO CARD */
.hero-card{margin:16px;border-radius:var(--radius-lg);overflow:hidden;display:flex;background:var(--card);border:1px solid var(--border);animation:fadeUp .6s .1s both}
.hero-img{width:140px;min-height:140px;background:linear-gradient(135deg,#2a2530,#1a1520,#2d2535);position:relative;overflow:hidden;flex-shrink:0}
.hero-img::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='20' fill='none' stroke='rgba(212,168,83,0.08)' stroke-width='0.5'/%3E%3C/svg%3E") repeat}
.hero-text{padding:20px;display:flex;flex-direction:column;justify-content:center;gap:6px}
.hero-text h2{font-size:1rem;font-weight:600}
.hero-text p{font-size:.8rem;color:var(--text2);line-height:1.5}

/* CLOCK + ALERT ROW */
.clock-alert-row{display:flex;gap:10px;margin:0 16px 16px;animation:fadeUp .6s .2s both}
.clock-widget{display:flex;gap:6px;align-items:center;flex-shrink:0}
.clock-digit{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:1.4rem;font-weight:600;font-family:var(--font-title);width:44px;text-align:center;letter-spacing:.02em;font-variant-numeric:tabular-nums}
.clock-sep{font-size:1.2rem;color:var(--text3);animation:pulse 1s infinite}
.clock-date{font-size:.65rem;color:var(--text3);text-align:center;margin-top:2px}
.alert-widget{flex:1;background:var(--accent-bg);border:1px solid rgba(212,168,83,.2);border-radius:var(--radius);padding:12px 14px;position:relative;cursor:default;min-height:70px;transition:border-color .3s}
.alert-widget.editing{border-color:var(--accent);background:rgba(212,168,83,.18)}
.alert-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.alert-icon{color:var(--accent);font-size:.85rem}
.alert-title{font-size:.75rem;font-weight:700;letter-spacing:.05em;color:var(--accent)}
.alert-body{font-size:.72rem;color:var(--text2);line-height:1.5;outline:none}
.alert-edit{position:absolute;top:8px;right:8px;opacity:.4;cursor:pointer;transition:opacity .2s,color .2s}
.alert-edit:hover{opacity:1}
.alert-widget.editing .alert-edit{opacity:1;color:var(--accent)}

/* SECTION LABELS */
.section-label{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);padding:20px 20px 10px;font-weight:500}

/* CATEGORY CARDS */
.category-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.category-card{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .25s var(--transition),box-shadow .25s,border-color .25s;animation:slideInRight .5s both}
.category-card:nth-child(1){animation-delay:.15s}.category-card:nth-child(2){animation-delay:.25s}.category-card:nth-child(3){animation-delay:.35s}.category-card:nth-child(4){animation-delay:.45s}
.category-card:hover{transform:translateX(4px);border-color:var(--border2);box-shadow:var(--shadow)}
.category-card:active{transform:scale(.98)}
.cat-img{width:70px;height:70px;flex-shrink:0;position:relative;overflow:hidden;background-size:cover;background-position:center}
.cat-img.beauty{background-color:#2a1f2e;background-image:linear-gradient(135deg,#2a1f2e,#1e1525)}
.cat-img.mind{background-color:#1a2030;background-image:linear-gradient(135deg,#1a2030,#151a28)}
.cat-img.ugc{background-color:#1a2520;background-image:linear-gradient(135deg,#1a2520,#152520)}
.cat-img.lab{background-color:#2a2518;background-image:linear-gradient(135deg,#2a2518,#201c12)}
.cat-img.custom{background-color:#1e1e28;background-image:linear-gradient(135deg,#1e1e28,#18182a)}
.cat-img-edit{position:absolute;bottom:2px;right:2px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:#fff;opacity:0;transition:opacity .25s;cursor:pointer;z-index:2}
.category-card:hover .cat-img-edit{opacity:1}

/* SUBPAGE COVER */
.sp-cover{width:100%;height:160px;background:var(--card2);position:relative;overflow:hidden;background-size:cover;background-position:center}
.sp-cover-edit{position:absolute;bottom:10px;right:10px;padding:5px 10px;border-radius:6px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);font-size:.68rem;color:#fff;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .2s}
.sp-cover-edit:hover{background:rgba(0,0,0,.75)}
.sp-clock-row{display:flex;gap:6px;align-items:center;justify-content:center;padding:14px 16px 0;flex-shrink:0}
.sp-clock-row .clock-digit{font-size:1rem;padding:6px 8px;width:36px}
.sp-clock-row .clock-sep{font-size:.9rem}
.sp-clock-date{font-size:.6rem;color:var(--text3);padding:2px 16px 0;text-align:center}
.sp-description{padding:8px 16px 16px;text-align:center}
.sp-description p{font-size:.78rem;color:var(--text2);line-height:1.5;outline:none;padding:8px 12px;border-radius:var(--radius-sm);border:1px solid transparent;transition:border-color .2s,background .2s;display:inline-block;max-width:100%}
.sp-description p:focus{border-color:var(--accent);background:var(--accent-bg)}
.cat-info{flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:2px}
.cat-info .cat-title{display:flex;align-items:center;gap:6px;font-size:.9rem;font-weight:600}
.cat-info .cat-icon{font-size:.85rem;opacity:.7}
.cat-info .cat-desc{font-size:.72rem;color:var(--text2)}
.cat-arrow{padding:0 14px;color:var(--text3);font-size:1rem;transition:transform .2s}
.category-card:hover .cat-arrow{transform:translateX(3px);color:var(--text2)}
.add-subpage-btn{margin:10px 16px;padding:14px;border-radius:var(--radius);border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;gap:8px;font-size:.8rem;color:var(--text3);cursor:pointer;transition:all .25s}
.add-subpage-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* CALENDAR */
.calendar-widget{margin:0 16px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;animation:fadeUp .6s .3s both}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-header h3{font-size:.95rem;font-weight:600}
.cal-nav{display:flex;gap:4px}
.cal-nav button{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s}
.cal-nav button:hover{background:var(--card2)}
.cal-nav button svg{width:14px;height:14px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.cal-day-label{font-size:.65rem;color:var(--text3);padding:6px 0;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.cal-day{font-size:.8rem;padding:8px 0;border-radius:8px;cursor:pointer;transition:all .2s;position:relative}
.cal-day:hover{background:var(--card2)}
.cal-day.today{background:var(--accent);color:#000;font-weight:700;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.cal-day.selected{background:var(--card2);border:1px solid var(--accent)}
.cal-day.other-month{color:var(--text3);opacity:.4}
.cal-day.has-event::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-events{margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.cal-events-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-events-header h4{font-size:.8rem;font-weight:600}
.cal-event-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card2);border-radius:var(--radius-sm);margin-bottom:6px;font-size:.78rem;animation:scaleIn .3s both}
.cal-event-item .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.cal-event-item span{flex:1}
.cal-event-item button{opacity:.4;transition:opacity .2s}
.cal-event-item button:hover{opacity:1;color:var(--danger)}
.cal-no-events{font-size:.78rem;color:var(--text3);text-align:center;padding:8px 0}

/* SUMMARY */
.summary-widget{margin:0 16px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;animation:fadeUp .6s .4s both}
.summary-item{padding:10px 0;border-bottom:1px solid var(--border)}
.summary-item:last-child{border:none}
.summary-item h4{font-size:.82rem;font-weight:600;margin-bottom:4px}
.summary-item p{font-size:.72rem;color:var(--text2);line-height:1.4}
.summary-item p span{margin-right:12px}

/* SIDEBAR */
.sidebar-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);opacity:0;visibility:hidden;transition:opacity .35s,visibility .35s}
.sidebar-overlay.open{opacity:1;visibility:visible}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:280px;z-index:501;background:var(--bg2);border-right:1px solid var(--border);transform:translateX(-100%);transition:transform .35s var(--transition);display:flex;flex-direction:column;overflow-y:auto}
.sidebar.open{transform:translateX(0)}
.sidebar-header{display:flex;align-items:center;gap:12px;padding:20px;border-bottom:1px solid var(--border)}
.sidebar-logo{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.sidebar-brand h2{font-size:.9rem;font-weight:600}
.sidebar-brand p{font-size:.65rem;color:var(--text3)}
.sidebar-close{margin-left:auto;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .2s}
.sidebar-close:hover{background:var(--card)}
.sidebar-section{padding:12px}
.sidebar-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sidebar-section-header span{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);font-weight:500}
.sidebar-theme-toggle{font-size:.7rem;color:var(--text3);display:flex;align-items:center;gap:4px;cursor:pointer;transition:color .2s}
.sidebar-theme-toggle:hover{color:var(--text)}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;font-size:.82rem;cursor:pointer;transition:all .2s;margin-bottom:2px}
.sidebar-item:hover{background:var(--card)}
.sidebar-item.active{background:var(--text);color:var(--bg);font-weight:600}
.sidebar-item .si-icon{font-size:.85rem;width:20px;text-align:center;opacity:.7}
.sidebar-item .si-arrow{margin-left:auto;opacity:.3;font-size:.75rem}
.sidebar-divider{height:1px;background:var(--border);margin:8px 12px}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;height:var(--nav-h);background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-around;padding:0 16px}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;border-radius:12px;cursor:pointer;transition:all .25s;position:relative}
.nav-item:hover{background:var(--card)}
.nav-item.active::after{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:20px;height:2px;border-radius:2px;background:var(--accent)}
.nav-item svg{width:20px;height:20px;stroke:var(--text3);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:stroke .25s}
.nav-item.active svg{stroke:var(--text)}
.nav-item span{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-weight:500;transition:color .25s}
.nav-item.active span{color:var(--text)}

/* SUBPAGE VIEW */
.subpage-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border)}
.back-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.back-btn:hover{background:var(--card)}
.back-btn svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.subpage-title{font-size:1.1rem;font-family:var(--font-title);font-weight:600;outline:none;flex:1;border-bottom:1px solid transparent;transition:border-color .2s;padding:4px 0}
.subpage-title:focus{border-color:var(--accent)}
.subpage-actions{display:flex;gap:6px}
.widget-list{padding:16px}
.widget-container{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;animation:scaleIn .35s both}
.widget-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.widget-header h3{font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:6px}
.widget-header .widget-type{font-size:.6rem;color:var(--text3);background:var(--card2);padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.08em}
.widget-body{padding:16px}
.widget-delete{opacity:.3;transition:opacity .2s}
.widget-delete:hover{opacity:1;color:var(--danger)}
.add-widget-btn{margin:0 16px 16px;padding:16px;border-radius:var(--radius);border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;gap:8px;font-size:.82rem;color:var(--text3);cursor:pointer;transition:all .25s}
.add-widget-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* WIDGET PICKER MODAL */
.modal-overlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s}
.modal-overlay.open{opacity:1;visibility:visible}
.modal-content{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:480px;padding:24px;transform:translateY(100%);transition:transform .35s var(--transition)}
.modal-overlay.open .modal-content{transform:translateY(0)}
.modal-title{font-size:.85rem;font-weight:600;margin-bottom:16px}
.widget-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.widget-option{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;border:1px solid transparent}
.widget-option:hover{background:var(--card);border-color:var(--border)}
.widget-option:active{transform:scale(.93)}
.widget-option .wo-icon{font-size:1.4rem;opacity:.7}
.widget-option .wo-label{font-size:.6rem;color:var(--text2);text-transform:capitalize}
.modal-datasource{padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text2);cursor:pointer;transition:all .2s}
.modal-datasource:hover{border-color:var(--accent);color:var(--accent)}

/* WIDGET-SPECIFIC STYLES */
.w-table{width:100%;border-collapse:collapse;font-size:.78rem}
.w-table th,.w-table td{padding:8px 10px;border:1px solid var(--border);text-align:left}
.w-table th{background:var(--card2);font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text2)}
.w-table td{cursor:text}
.w-table td:focus{outline:1px solid var(--accent);background:var(--accent-bg)}
.w-kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.w-kanban-col{flex:1;min-width:140px;background:var(--card2);border-radius:var(--radius-sm);padding:10px}
.w-kanban-col h4{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:8px;font-weight:600}
.w-kanban-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:.76rem;margin-bottom:6px;cursor:pointer;transition:transform .2s,box-shadow .2s}
.w-kanban-card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.w-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.w-gallery-item{aspect-ratio:1;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;cursor:pointer;transition:transform .2s}
.w-gallery-item:hover{transform:scale(1.03)}
.w-list-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:.8rem}
.w-list-item:last-child{border:none}
.w-list-item input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.w-list-item.done span{text-decoration:line-through;color:var(--text3)}
.w-chart{display:flex;align-items:flex-end;gap:8px;height:120px;padding-top:10px}
.w-chart-bar{flex:1;border-radius:4px 4px 0 0;background:linear-gradient(to top,var(--accent),var(--accent2));transition:height .4s var(--transition);position:relative;min-height:10px}
.w-chart-bar span{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:.6rem;color:var(--text2)}
.w-panel{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.w-panel-card{background:var(--card2);border-radius:var(--radius-sm);padding:14px;text-align:center}
.w-panel-card .val{font-size:1.4rem;font-weight:700;font-family:var(--font-title);color:var(--accent)}
.w-panel-card .lbl{font-size:.65rem;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.w-timeline{position:relative;padding-left:20px}
.w-timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1.5px;background:var(--border)}
.w-timeline-item{position:relative;padding:8px 0 16px 14px}
.w-timeline-item::before{content:'';position:absolute;left:-17px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}
.w-timeline-item .tl-date{font-size:.65rem;color:var(--text3)}
.w-timeline-item .tl-text{font-size:.8rem;margin-top:2px}
.w-feed-post{padding:12px 0;border-bottom:1px solid var(--border)}
.w-feed-post:last-child{border:none}
.w-feed-post .fp-time{font-size:.65rem;color:var(--text3);margin-bottom:4px}
.w-feed-post .fp-text{font-size:.8rem;line-height:1.5}
.w-map{width:100%;height:200px;border-radius:var(--radius-sm);background:var(--card2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text3);font-size:.8rem}
.w-mini-cal{font-size:.75rem}

/* ACCORDION WIDGET */
.w-accordion{display:flex;flex-direction:column;gap:8px}
.w-acc-cat{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:border-color .25s}
.w-acc-cat.open{border-color:var(--border2)}
.w-acc-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background .2s;user-select:none}
.w-acc-header:hover{background:var(--card2)}
.w-acc-header .acc-icon{font-size:.85rem;opacity:.6;flex-shrink:0}
.w-acc-header .acc-title{flex:1;font-size:.85rem;font-weight:600}
.w-acc-header .acc-actions{display:flex;gap:4px;align-items:center}
.w-acc-header .acc-arrow{font-size:.75rem;color:var(--text3);transition:transform .3s var(--transition);flex-shrink:0}
.w-acc-cat.open .acc-arrow{transform:rotate(180deg)}
.w-acc-body{max-height:0;overflow:hidden;transition:max-height .35s var(--transition),padding .35s}
.w-acc-cat.open .w-acc-body{max-height:800px;padding:0 14px 14px}
.w-acc-desc{font-size:.72rem;color:var(--text3);font-style:italic;margin-bottom:10px;line-height:1.4}
.w-acc-items{display:flex;flex-direction:column;gap:2px}
.w-acc-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:.8rem;cursor:pointer;transition:background .2s}
.w-acc-item:hover{background:var(--card2)}
.w-acc-item .acc-dash{color:var(--text3);font-weight:300;flex-shrink:0}
.w-acc-item span{flex:1}
.w-acc-item .acc-item-edit{opacity:0;transition:opacity .2s;font-size:.7rem;color:var(--text3)}
.w-acc-item:hover .acc-item-edit{opacity:.6}
.w-acc-item .acc-item-edit:hover{opacity:1;color:var(--accent)}
.w-acc-add{display:flex;align-items:center;gap:6px;padding:6px 10px;margin-top:4px;font-size:.75rem;color:var(--text3);cursor:pointer;border-radius:6px;transition:all .2s}
.w-acc-add:hover{color:var(--accent);background:var(--accent-bg)}
.w-acc-cat-add{border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:12px 14px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:.78rem;color:var(--text3);cursor:pointer;transition:all .25s}
.w-acc-cat-add:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* ACCORDION DETAIL MODAL */
.acc-detail-overlay{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;padding:20px}
.acc-detail-overlay.open{opacity:1;visibility:visible}
.acc-detail-modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:440px;max-height:80vh;display:flex;flex-direction:column;transform:scale(.92);opacity:0;transition:transform .3s var(--transition),opacity .3s}
.acc-detail-overlay.open .acc-detail-modal{transform:scale(1);opacity:1}
.acc-detail-top{padding:20px 20px 0;display:flex;flex-direction:column;gap:4px;position:relative}
.acc-detail-cat{font-size:.65rem;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.acc-detail-title{font-size:1.1rem;font-family:var(--font-title);font-weight:600}
.acc-detail-close{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
.acc-detail-close:hover{background:var(--card)}
.acc-detail-close svg{width:14px;height:14px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.acc-detail-body{padding:16px 20px 20px;flex:1;overflow-y:auto}
.acc-detail-label{font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;font-weight:500}
.acc-detail-content{min-height:140px;padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border);font-size:.82rem;line-height:1.6;color:var(--text);outline:none;transition:border-color .25s,background .25s;white-space:pre-wrap}
.acc-detail-content:empty::before{content:attr(data-placeholder);color:var(--text3);font-style:italic}
.acc-detail-content:focus{border-color:var(--accent);background:var(--accent-bg)}
.small-btn{font-size:.7rem;padding:4px 10px;border-radius:6px;background:var(--card2);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .2s}
.small-btn:hover{border-color:var(--accent);color:var(--accent)}
.small-btn.accent{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.small-btn.accent:hover{background:var(--accent2)}
.inline-input{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:.78rem;color:var(--text);width:100%;transition:border-color .2s}
.inline-input:focus{border-color:var(--accent);outline:none}
.fav-btn{color:var(--text3);transition:color .2s}.fav-btn.active{color:var(--accent)}

/* EVENT INPUT */
.event-input-row{display:flex;gap:6px;margin-top:8px}
.event-input-row input{flex:1}

/* RESPONSIVE */
@media(min-width:600px){
  #app{max-width:480px;margin:0 auto}
  .bottom-nav{max-width:480px;left:50%;transform:translateX(-50%)}
  .widget-grid{grid-template-columns:repeat(5,1fr)}
}
@media(min-width:1024px){
  #app{max-width:420px;margin:0 auto;border-left:1px solid var(--border);border-right:1px solid var(--border);min-height:100vh}
}
</style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <h1>The Muse Studio</h1>
  <p>workspace pessoal</p>
  <div class="splash-line"></div>
</div>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">✦</div>
    <div class="sidebar-brand"><h2>The Muse Studio</h2><p>workspace pessoal</p></div>
    <button class="sidebar-close" id="sidebarClose"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  </div>

</nav>

<!-- WIDGET PICKER MODAL -->
<div class="modal-overlay" id="widgetModal">

    <div class="widget-grid" id="widgetGrid"></div>

</div>

<!-- ACCORDION DETAIL MODAL -->
<div class="acc-detail-overlay" id="accDetailOverlay">
  <div class="acc-detail-modal">
    <div class="acc-detail-top">
      <div class="acc-detail-cat" id="accDetailCat"></div>
      <div class="acc-detail-title" id="accDetailTitle"></div>
      <button class="acc-detail-close" onclick="closeAccDetail()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="acc-detail-body">
      <div class="acc-detail-label">CONTEÚDO</div>
      <div class="acc-detail-content" id="accDetailContent" contenteditable="true" data-placeholder="Clique para adicionar conteúdo a esta subpágina..."></div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header class="app-header">
    <button class="icon-btn" id="menuBtn"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <h1>The Muse Studio</h1>
    <div class="header-actions">
      <button class="icon-btn" id="themeToggle"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg></button>
    </div>
  </header>
  <main id="mainContent"></main>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottomNav"></nav>

<script>

// ========== STATE ==========
const DEFAULT_STATE = {
  theme: 'dark',
  alert: { title: 'CUIDADO COM O FÍGADO', body: 'Leia a embalagem do suplemento. Verificar vitaminas com médico antes de usar. Prioridade máxima.' },
  subpages: [
    { id:'beauty-hub', name:'Beauty Hub', icon:'✧', desc:'Rotina de beleza — diário ao anual', longDesc:'Organize sua rotina de skincare, cabelo e bem-estar.', gradient:'beauty', coverImage:'', widgets:[], favorite:false, deleted:false },
    { id:'mind-soul', name:'Mind & Soul', icon:'◑', desc:'Estudos, idiomas e espiritualidade', longDesc:'Estudos, idiomas, leituras e crescimento pessoal.', gradient:'mind', coverImage:'', widgets:[], favorite:false, deleted:false },
    { id:'ugc-studio', name:'UGC Studio', icon:'▢', desc:'Conteúdo, ideias e produção', longDesc:'Ideias, produções e planejamento de conteúdo.', gradient:'ugc', coverImage:'', widgets:[], favorite:false, deleted:false },
    { id:'lab-pesquisas', name:'Lab Pesquisas', icon:'◎', desc:'Itens marcados com P', longDesc:'Pesquisas, referências e itens para investigar.', gradient:'lab', coverImage:'', widgets:[], favorite:false, deleted:false }
  ],
  events: {},
  currentView: 'home',
  currentSubpage: null,
  selectedDate: new Date().toISOString().split('T')[0],
  calMonth: new Date().getMonth(),
  calYear: new Date().getFullYear()
};

let state;
function loadState() {
  try { const s = localStorage.getItem('muse_state'); state = s ? {...DEFAULT_STATE, ...JSON.parse(s)} : JSON.parse(JSON.stringify(DEFAULT_STATE)); }
  catch(e) { state = JSON.parse(JSON.stringify(DEFAULT_STATE)); }
  document.documentElement.setAttribute('data-theme', state.theme);
}
function saveState() { localStorage.setItem('muse_state', JSON.stringify(state)); }
function genId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5); }

// ========== ICONS SVG ==========
const ICONS = {
  home: '<svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>',
  beauty: '<svg viewBox="0 0 24 24"><path d="M12 3l1.5 4.5H18l-3.5 2.5L16 14.5 12 11.5l-4 3L9.5 10 6 7.5h4.5z"/></svg>',
  mind: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 010 18"/><path d="M12 7v10M8 12h8"/></svg>',
  ugc: '<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M10 9l5 3-5 3z"/></svg>',
  plus: '<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  chevLeft: '<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>',
  chevRight: '<svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>',
  back: '<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>',
  trash: '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>',
  star: '<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
  edit: '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  moon: '<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>',
  sun: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
  x: '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
};

const WIDGET_TYPES = [
  { type:'tabela', label:'Tabela', icon:'⊞' },
  { type:'quadro', label:'Quadro', icon:'⊟' },
  { type:'galeria', label:'Galeria', icon:'⊞⊞' },
  { type:'lista', label:'Lista', icon:'☰' },
  { type:'grafico', label:'Gráfico', icon:'◔' },
  { type:'painel', label:'Painel', icon:'⊡' },
  { type:'cronograma', label:'Cronograma', icon:'◫' },
  { type:'feed', label:'Feed', icon:'⊞⊞' },
  { type:'mapa', label:'Mapa', icon:'◧' },
  { type:'calendario', label:'Calendário', icon:'▦' },
  { type:'acordeao', label:'Acordeão', icon:'▤' }
];

const DAYS_PT = ['D','S','T','Q','Q','S','S'];
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WEEKDAYS_PT = ['Domingo','Segunda-Feira','Terça-Feira','Quarta-Feira','Quinta-Feira','Sexta-Feira','Sábado'];

// ========== SPLASH ==========
function initSplash() {
  setTimeout(() => {
    document.getElementById('splash').classList.add('hide');
    document.getElementById('app').classList.add('show');
  }, 2200);
}

// ========== THEME ==========
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeToggle').innerHTML = state.theme === 'dark' ? ICONS.moon : ICONS.sun;
  saveState();
  renderSidebar();
}

// ========== CLOCK ==========
let clockInterval;
function startClock() {
  function update() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    const clockHTML = `<span class="clock-digit">${h}</span><span class="clock-sep">:</span><span class="clock-digit">${m}</span><span class="clock-sep">:</span><span class="clock-digit">${s}</span>`;
    const dateText = `${WEEKDAYS_PT[now.getDay()]}, ${now.getDate()} de ${MONTHS_PT[now.getMonth()]}`;

    // Home clock
    const el = document.getElementById('clockDigits');
    const dateEl = document.getElementById('clockDate');
    if(el) el.innerHTML = clockHTML;
    if(dateEl) dateEl.textContent = dateText;

    // Subpage clock
    const spEl = document.getElementById('spClockDigits');
    const spDateEl = document.getElementById('spClockDate');
    if(spEl) spEl.innerHTML = clockHTML;
    if(spDateEl) spDateEl.textContent = dateText;
  }
  update();
  clearInterval(clockInterval);
  clockInterval = setInterval(update, 1000);
}

// ========== ROUTER ==========
function navigate(view, subpageId) {
  state.currentView = view;
  state.currentSubpage = subpageId || null;
  saveState();
  render();
}

function render() {
  const main = document.getElementById('mainContent');
  if (state.currentView === 'home') renderHome(main);
  else if (state.currentView === 'subpage') renderSubpage(main);
  renderBottomNav();
  startClock();
}

// ========== HOME ==========
function renderHome(container) {
  const activeSubpages = state.subpages.filter(s => !s.deleted);
  const today = new Date();
  const dateKey = state.selectedDate;
  const selDate = new Date(dateKey + 'T12:00:00');
  const dayEvents = state.events[dateKey] || [];

  container.innerHTML = `
    <div class="hero-card">
      <div class="hero-img"></div>
      <div class="hero-text">
        <h2>Bem vindo(a) de volta!</h2>
        <p>Um estúdio digital para organizar a sua vida.</p>
        <p style="margin-top:4px;font-size:.72rem;color:var(--text3)">The Muse Studio está dividido em ${activeSubpages.length} categorias principais.</p>
      </div>
    </div>

    <div class="clock-alert-row">
      <div>
        <div class="clock-widget" id="clockDigits"></div>
        <div class="clock-date" id="clockDate"></div>
      </div>
      <div class="alert-widget" id="alertWidget">
        <div class="alert-header">
          <span class="alert-icon">⚠</span>
          <span class="alert-title" id="alertTitle">${state.alert.title}</span>
        </div>
        <div class="alert-body" id="alertBody">${state.alert.body}</div>
        <span class="alert-edit" id="alertEditBtn" onclick="toggleAlertEdit()" title="Editar lembrete">✎</span>
      </div>
    </div>

    <div class="section-label">MENU</div>
    <div class="category-list" id="categoryList">
      ${activeSubpages.map((s,i) => `
        <div class="category-card" onclick="navigate('subpage','${s.id}')" style="animation-delay:${0.15+i*0.1}s">
          <div class="cat-img ${s.gradient || 'custom'}" ${s.coverImage ? `style="background-image:url('${s.coverImage}')"` : ''}>
            <span class="cat-img-edit" onclick="event.stopPropagation();changeCoverImage('${s.id}')" title="Trocar capa">✎</span>
          </div>
          <div class="cat-info">
            <div class="cat-title"><span class="cat-icon">${s.icon}</span>${s.name}</div>
            <div class="cat-desc">${s.desc}</div>
          </div>
          <span class="cat-arrow">›</span>
        </div>
      `).join('')}
    </div>
    <div class="add-subpage-btn" onclick="addSubpage()">
      <span>＋</span> Adicionar nova subpágina
    </div>

    <div class="section-label">CALENDÁRIO</div>
    ${renderCalendarHTML()}

    <div class="section-label">RESUMO</div>
    <div class="summary-widget">
      <div style="font-size:.72rem;color:var(--text3);margin-bottom:10px">Hoje é ${today.getDate()} de ${MONTHS_PT[today.getMonth()].toLowerCase()} de ${today.getFullYear()}</div>
      ${activeSubpages.map(s => {
        const wc = s.widgets.length;
        const listWidgets = s.widgets.filter(w => w.type === 'lista');
        let done = 0, total = 0;
        listWidgets.forEach(w => { if(w.data && w.data.items) { total += w.data.items.length; done += w.data.items.filter(i=>i.done).length; }});
        return `<div class="summary-item"><h4>${s.name}</h4><p><span>↳ ${wc} widget${wc!==1?'s':''}</span><span>↳ ${total>0?done+'/'+total+' tarefas':'0 tarefas'}</span></p></div>`;
      }).join('')}
    </div>
  `;

  // Alert edit handlers (only editable when pencil is clicked)
  setTimeout(() => {
    const at = document.getElementById('alertTitle');
    const ab = document.getElementById('alertBody');
    if(at) at.addEventListener('blur', () => { state.alert.title = at.textContent; saveState(); });
    if(ab) ab.addEventListener('blur', () => { state.alert.body = ab.textContent; saveState(); });
  }, 100);
}

// ========== ALERT EDIT TOGGLE ==========
function toggleAlertEdit() {
  const widget = document.getElementById('alertWidget');
  const title = document.getElementById('alertTitle');
  const body = document.getElementById('alertBody');
  if(!widget || !title || !body) return;

  const isEditing = widget.classList.contains('editing');
  if(isEditing) {
    // Desativa edição e salva
    widget.classList.remove('editing');
    title.contentEditable = 'false';
    body.contentEditable = 'false';
    title.style.cursor = 'default';
    body.style.cursor = 'default';
    state.alert.title = title.textContent;
    state.alert.body = body.textContent;
    saveState();
  } else {
    // Ativa edição
    widget.classList.add('editing');
    title.contentEditable = 'true';
    body.contentEditable = 'true';
    title.style.cursor = 'text';
    body.style.cursor = 'text';
    body.focus();
  }
}

// ========== CALENDAR ==========
function renderCalendarHTML() {
  const year = state.calYear;
  const month = state.calMonth;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const today = new Date();
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const selDate = state.selectedDate;
  const dayEvents = state.events[selDate] || [];
  const selD = new Date(selDate + 'T12:00:00');

  let cells = '';
  // Previous month days
  for(let i = firstDay - 1; i >= 0; i--) {
    cells += `<div class="cal-day other-month">${daysInPrev - i}</div>`;
  }
  // Current month
  for(let d = 1; d <= daysInMonth; d++) {
    const dk = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dk === todayStr;
    const isSel = dk === selDate && !isToday;
    const hasEv = (state.events[dk] && state.events[dk].length > 0);
    cells += `<div class="cal-day${isToday?' today':''}${isSel?' selected':''}${hasEv?' has-event':''}" onclick="selectDate('${dk}')">${d}</div>`;
  }
  // Next month fill
  const totalCells = firstDay + daysInMonth;
  const remaining = (7 - totalCells % 7) % 7;
  for(let i = 1; i <= remaining; i++) {
    cells += `<div class="cal-day other-month">${i}</div>`;
  }

  return `
  <div class="calendar-widget">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)"><span>${ICONS.chevLeft}</span></button>
      <h3>${MONTHS_PT[month]} ${year}</h3>
      <button class="cal-nav" onclick="calNav(1)"><span>${ICONS.chevRight}</span></button>
    </div>
    <div class="cal-grid">
      ${DAYS_PT.map(d => `<div class="cal-day-label">${d}</div>`).join('')}
      ${cells}
    </div>
    <div class="cal-events">
      <div class="cal-events-header">
        <h4>${WEEKDAYS_PT[selD.getDay()]}, ${selD.getDate()} De ${MONTHS_PT[selD.getMonth()]}</h4>
        <button class="small-btn accent" onclick="promptAddEvent()">＋</button>
      </div>
      ${dayEvents.length === 0 ? '<div class="cal-no-events">Nenhum evento neste dia</div>' :
        dayEvents.map((ev,i) => `
          <div class="cal-event-item">
            <span class="dot"></span>
            <span>${ev}</span>
            <button onclick="removeEvent('${selDate}',${i})">${ICONS.x}</button>
          </div>
        `).join('')}
      <div class="event-input-row" id="eventInputRow" style="display:none">
        <input class="inline-input" id="eventInput" placeholder="Descreva o evento..." onkeydown="if(event.key==='Enter')confirmAddEvent()">
        <button class="small-btn accent" onclick="confirmAddEvent()">OK</button>
      </div>
    </div>
  </div>`;
}

function selectDate(dk) { state.selectedDate = dk; saveState(); render(); }
function calNav(dir) {
  state.calMonth += dir;
  if(state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
  if(state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
  saveState(); render();
}
function promptAddEvent() {
  const r = document.getElementById('eventInputRow');
  if(r) { r.style.display = 'flex'; document.getElementById('eventInput').focus(); }
}
function confirmAddEvent() {
  const inp = document.getElementById('eventInput');
  if(!inp || !inp.value.trim()) return;
  if(!state.events[state.selectedDate]) state.events[state.selectedDate] = [];
  state.events[state.selectedDate].push(inp.value.trim());
  saveState(); render();
}
function removeEvent(dk, idx) {
  if(state.events[dk]) { state.events[dk].splice(idx, 1); saveState(); render(); }
}

// ========== SUBPAGES CRUD ==========
function addSubpage() {
  const name = prompt('Nome da nova subpágina:');
  if(!name || !name.trim()) return;
  state.subpages.push({
    id: genId(), name: name.trim(), icon:'◇', desc:'Nova subpágina personalizada',
    longDesc:'Adicione uma descrição para esta subpágina.', gradient:'custom', coverImage:'', widgets:[], favorite:false, deleted:false
  });
  saveState(); render();
}
function deleteSubpage(id) {
  const sp = state.subpages.find(s => s.id === id);
  if(sp && confirm(`Mover "${sp.name}" para a lixeira?`)) {
    sp.deleted = true; saveState();
    navigate('home');
  }
}
function restoreSubpage(id) {
  const sp = state.subpages.find(s => s.id === id);
  if(sp) { sp.deleted = false; saveState(); renderSidebar(); render(); }
}
function permanentDelete(id) {
  if(confirm('Excluir permanentemente?')) {
    state.subpages = state.subpages.filter(s => s.id !== id);
    saveState(); renderSidebar(); render();
  }
}
function toggleFavorite(id) {
  const sp = state.subpages.find(s => s.id === id);
  if(sp) { sp.favorite = !sp.favorite; saveState(); renderSidebar(); render(); }
}

// ========== SUBPAGE VIEW ==========
function renderSubpage(container) {
  const sp = state.subpages.find(s => s.id === state.currentSubpage);
  if(!sp) { navigate('home'); return; }
  if(!sp.longDesc) sp.longDesc = '';
  if(!sp.coverImage) sp.coverImage = '';

  const coverStyle = sp.coverImage
    ? `background-image:url('${sp.coverImage}')`
    : `background:linear-gradient(135deg, var(--card2), var(--card))`;

  container.innerHTML = `
    <div class="sp-cover" style="${coverStyle}">
      <span class="sp-cover-edit" onclick="changeCoverImage('${sp.id}')">✎ Alterar capa</span>
    </div>
    <div class="subpage-header">
      <button class="back-btn" onclick="navigate('home')">${ICONS.back}</button>
      <div class="subpage-title" contenteditable="true" id="spTitle">${sp.name}</div>
      <div class="subpage-actions">
        <button class="icon-btn fav-btn ${sp.favorite?'active':''}" onclick="toggleFavorite('${sp.id}')" title="Favorito">${ICONS.star}</button>
        <button class="icon-btn" onclick="deleteSubpage('${sp.id}')" title="Excluir">${ICONS.trash}</button>
      </div>
    </div>
    <div class="sp-description">
      <p contenteditable="true" id="spDesc" placeholder="Adicione uma descrição...">${sp.longDesc || 'Clique para adicionar uma descrição...'}</p>
    </div>
    <div class="sp-clock-row" id="spClockDigits"></div>
    <div class="sp-clock-date" id="spClockDate"></div>
    <div class="widget-list" id="widgetList">
      ${sp.widgets.map((w,i) => renderWidget(w, i, sp.id)).join('')}
    </div>
    <div class="add-widget-btn" onclick="openWidgetPicker('${sp.id}')">
      <span>＋</span> Adicionar visualização
    </div>
  `;

  setTimeout(() => {
    const t = document.getElementById('spTitle');
    if(t) t.addEventListener('blur', () => { sp.name = t.textContent.trim() || sp.name; saveState(); });
    const d = document.getElementById('spDesc');
    if(d) d.addEventListener('blur', () => { sp.longDesc = d.textContent.trim(); saveState(); });
  }, 50);
}

// ========== COVER IMAGE ==========
function changeCoverImage(spId) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const sp = state.subpages.find(s => s.id === spId);
      if(sp) {
        sp.coverImage = ev.target.result;
        saveState();
        render();
      }
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

// ========== WIDGET ENGINE ==========
function getDefaultData(type) {
  switch(type) {
    case 'tabela': return { columns:['Item','Status','Notas'], rows:[['Exemplo','Ativo','—']] };
    case 'quadro': return { columns:[{name:'A Fazer',cards:['Tarefa 1']},{name:'Fazendo',cards:[]},{name:'Feito',cards:[]}] };
    case 'galeria': return { items:[{title:'Item 1',color:'#2a2535'},{title:'Item 2',color:'#1e2530'},{title:'Item 3',color:'#252a1e'}] };
    case 'lista': return { items:[{text:'Primeiro item da lista',done:false},{text:'Segundo item',done:false}] };
    case 'grafico': return { labels:['Jan','Fev','Mar','Abr','Mai'], values:[30,55,40,70,45] };
    case 'painel': return { metrics:[{label:'Total',value:'0'},{label:'Concluído',value:'0'},{label:'Pendente',value:'0'},{label:'Progresso',value:'0%'}] };
    case 'cronograma': return { entries:[{date:'Hoje',text:'Início do cronograma'}] };
    case 'feed': return { posts:[{text:'Primeiro post do feed.',time:new Date().toLocaleString('pt-BR')}] };
    case 'mapa': return { label:'São Paulo, Brasil' };
    case 'calendario': return {};
    case 'acordeao': return { categories:[
      { id:genId(), title:'Nova Categoria', icon:'✦', desc:'Descrição da categoria...', expanded:true, items:[
        { id:genId(), text:'Primeiro item', content:'' },
        { id:genId(), text:'Segundo item', content:'' }
      ]}
    ]};
    default: return {};
  }
}

function addWidget(spId, type) {
  const sp = state.subpages.find(s => s.id === spId);
  if(!sp) return;
  sp.widgets.push({ id: genId(), type, title: WIDGET_TYPES.find(w=>w.type===type)?.label || type, data: getDefaultData(type) });
  saveState(); closeWidgetPicker(); render();
}

function removeWidget(spId, wIdx) {
  const sp = state.subpages.find(s => s.id === spId);
  if(sp) { sp.widgets.splice(wIdx, 1); saveState(); render(); }
}

function renderWidget(w, idx, spId) {
  let body = '';
  switch(w.type) {
    case 'tabela':
      body = `<table class="w-table"><thead><tr>${w.data.columns.map(c=>`<th>${c}</th>`).join('')}<th style="width:30px"></th></tr></thead><tbody>
        ${w.data.rows.map((r,ri)=>`<tr>${r.map((c,ci)=>`<td contenteditable="true" onblur="updateTableCell('${spId}',${idx},${ri},${ci},this.textContent)">${c}</td>`).join('')}<td><button class="widget-delete" onclick="removeTableRow('${spId}',${idx},${ri})">✕</button></td></tr>`).join('')}
      </tbody></table>
      <button class="small-btn" style="margin-top:8px" onclick="addTableRow('${spId}',${idx})">+ Linha</button>`;
      break;
    case 'quadro':
      body = `<div class="w-kanban">${w.data.columns.map((col,ci)=>`
        <div class="w-kanban-col">
          <h4>${col.name}</h4>
          ${col.cards.map((card,cri)=>`<div class="w-kanban-card" ondblclick="removeKanbanCard('${spId}',${idx},${ci},${cri})" title="Dbl-click para remover">${card}</div>`).join('')}
          <button class="small-btn" style="width:100%;margin-top:4px" onclick="addKanbanCard('${spId}',${idx},${ci})">+</button>
        </div>`).join('')}</div>`;
      break;
    case 'galeria':
      body = `<div class="w-gallery">${w.data.items.map((it,ii)=>`
        <div class="w-gallery-item" style="background:${it.color}" ondblclick="removeGalleryItem('${spId}',${idx},${ii})">${it.title}</div>`).join('')}
        <div class="w-gallery-item" style="background:var(--card2);border:1px dashed var(--border);color:var(--text3)" onclick="addGalleryItem('${spId}',${idx})">+</div>
      </div>`;
      break;
    case 'lista':
      body = `<div>${w.data.items.map((it,ii)=>`
        <div class="w-list-item ${it.done?'done':''}">
          <input type="checkbox" ${it.done?'checked':''} onchange="toggleListItem('${spId}',${idx},${ii})">
          <span>${it.text}</span>
          <button class="widget-delete" onclick="removeListItem('${spId}',${idx},${ii})">✕</button>
        </div>`).join('')}
        <div style="margin-top:8px"><input class="inline-input" placeholder="Novo item..." id="li_${w.id}" onkeydown="if(event.key==='Enter')addListItem('${spId}',${idx},'${w.id}')"></div>
      </div>`;
      break;
    case 'grafico':
      const maxVal = Math.max(...w.data.values, 1);
      body = `<div class="w-chart">${w.data.values.map((v,i)=>`
        <div class="w-chart-bar" style="height:${(v/maxVal)*100}%"><span>${w.data.labels[i]}: ${v}</span></div>`).join('')}
      </div>`;
      break;
    case 'painel':
      body = `<div class="w-panel">${w.data.metrics.map((m,mi)=>`
        <div class="w-panel-card">
          <div class="val" contenteditable="true" onblur="updatePanelMetric('${spId}',${idx},${mi},'value',this.textContent)">${m.value}</div>
          <div class="lbl">${m.label}</div>
        </div>`).join('')}</div>`;
      break;
    case 'cronograma':
      body = `<div class="w-timeline">${w.data.entries.map((e,ei)=>`
        <div class="w-timeline-item"><div class="tl-date">${e.date}</div><div class="tl-text">${e.text}</div></div>`).join('')}
      </div><button class="small-btn" style="margin-top:8px" onclick="addTimelineEntry('${spId}',${idx})">+ Entrada</button>`;
      break;
    case 'feed':
      body = `<div>${w.data.posts.map(p=>`
        <div class="w-feed-post"><div class="fp-time">${p.time}</div><div class="fp-text">${p.text}</div></div>`).join('')}
      </div><button class="small-btn" style="margin-top:8px" onclick="addFeedPost('${spId}',${idx})">+ Post</button>`;
      break;
    case 'mapa':
      body = `<div class="w-map"><span style="font-size:1.8rem">◎</span><span>${w.data.label}</span>
        <button class="small-btn" onclick="updateMapLabel('${spId}',${idx})">Alterar local</button></div>`;
      break;
    case 'calendario':
      body = `<div class="w-mini-cal" style="font-size:.75rem;color:var(--text2)">Calendário embutido — veja o calendário principal na Home.</div>`;
      break;
    case 'acordeao':
      body = `<div class="w-accordion">
        ${(w.data.categories||[]).map((cat,ci) => `
          <div class="w-acc-cat ${cat.expanded?'open':''}" id="acc_${w.id}_${ci}">
            <div class="w-acc-header" onclick="toggleAccCat('${spId}',${idx},${ci})">
              <span class="acc-icon">${cat.icon||'✦'}</span>
              <span class="acc-title">${cat.title}</span>
              <span class="acc-actions">
                <button class="widget-delete" onclick="event.stopPropagation();removeAccCat('${spId}',${idx},${ci})" title="Remover categoria" style="font-size:.65rem">✕</button>
              </span>
              <span class="acc-arrow">▾</span>
            </div>
            <div class="w-acc-body">
              <div class="w-acc-desc" contenteditable="true" onblur="updateAccCatDesc('${spId}',${idx},${ci},this.textContent)">${cat.desc}</div>
              <div class="w-acc-items">
                ${cat.items.map((item,ii) => `
                  <div class="w-acc-item" onclick="openAccDetail('${spId}',${idx},${ci},${ii})">
                    <span class="acc-dash">—</span>
                    <span>${item.text}</span>
                    <button class="acc-item-edit" onclick="event.stopPropagation();removeAccItem('${spId}',${idx},${ci},${ii})" title="Remover">✕</button>
                  </div>
                `).join('')}
              </div>
              <div class="w-acc-add" onclick="addAccItem('${spId}',${idx},${ci})">
                <span>＋</span> Adicionar item
              </div>
            </div>
          </div>
        `).join('')}
        <div class="w-acc-cat-add" onclick="addAccCat('${spId}',${idx})">
          <span>＋</span> Adicionar categoria
        </div>
      </div>`;
      break;
  }

  return `<div class="widget-container" style="animation-delay:${idx*0.08}s">
    <div class="widget-header">
      <h3><span>${WIDGET_TYPES.find(t=>t.type===w.type)?.icon||'◇'}</span> ${w.title} <span class="widget-type">${w.type}</span></h3>
      <button class="widget-delete" onclick="removeWidget('${spId}',${idx})" title="Remover widget">${ICONS.x}</button>
    </div>
    <div class="widget-body">${body}</div>
  </div>`;
}

function removeTableRow(spId,wIdx,rIdx){const sp=state.subpages.find(s=>s.id===spId);if(sp&&sp.widgets[wIdx]){sp.widgets[wIdx].data.rows.splice(rIdx,1);saveState();render();}}

// Accordion detail modal state
let accDetailCtx=null;
function openAccDetail(spId,wIdx,catIdx,itemIdx){
  const sp=state.subpages.find(s=>s.id===spId);
  if(!sp||!sp.widgets[wIdx])return;
  const cat=sp.widgets[wIdx].data.categories[catIdx];
  const item=cat.items[itemIdx];
  accDetailCtx={spId,wIdx,catIdx,itemIdx};
  document.getElementById('accDetailCat').innerHTML='✦ '+cat.title;
  document.getElementById('accDetailTitle').textContent=item.text;
  document.getElementById('accDetailContent').innerHTML=item.content||'';
  document.getElementById('accDetailOverlay').classList.add('open');
}
function closeAccDetail(){
  if(accDetailCtx){
    const {spId,wIdx,catIdx,itemIdx}=accDetailCtx;
    const sp=state.subpages.find(s=>s.id===spId);
    if(sp&&sp.widgets[wIdx]){
      sp.widgets[wIdx].data.categories[catIdx].items[itemIdx].content=document.getElementById('accDetailContent').innerHTML;
      saveState();
    }
  }
  accDetailCtx=null;
  document.getElementById('accDetailOverlay').classList.remove('open');
}

// ========== WIDGET PICKER ==========
function openWidgetPicker(spId) {
  const modal = document.getElementById('widgetModal');
  const grid = document.getElementById('widgetGrid');
  grid.innerHTML = WIDGET_TYPES.map(w => `
    <div class="widget-option" onclick="addWidget('${spId}','${w.type}')">
      <span class="wo-icon">${w.icon}</span>
      <span class="wo-label">${w.label}</span>
    </div>
  `).join('');
  modal.classList.add('open');
}
function closeWidgetPicker() { document.getElementById('widgetModal').classList.remove('open'); }
document.getElementById('widgetModal').addEventListener('click', function(e) { if(e.target === this) closeWidgetPicker(); });

// ========== SIDEBAR ==========
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
  renderSidebar();
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}
document.getElementById('menuBtn').addEventListener('click', openSidebar);
document.getElementById('sidebarClose').addEventListener('click', closeSidebar);
document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

function renderSidebar() {
  const active = state.subpages.filter(s => !s.deleted);
  const favs = state.subpages.filter(s => s.favorite && !s.deleted);
  const trashed = state.subpages.filter(s => s.deleted);

  document.getElementById('sidebarContent').innerHTML = `
    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <span>MENU</span>
        <div class="sidebar-theme-toggle" onclick="toggleTheme()">☽ ${state.theme==='dark'?'Escuro':'Claro'}</div>
      </div>
      <div class="sidebar-item ${state.currentView==='home'?'active':''}" onclick="closeSidebar();navigate('home')">
        <span class="si-icon">⌂</span> Início <span class="si-arrow">›</span>
      </div>
      ${active.map(s => `
        <div class="sidebar-item ${state.currentSubpage===s.id?'active':''}" onclick="closeSidebar();navigate('subpage','${s.id}')">
          <span class="si-icon">${s.icon}</span> ${s.name} <span class="si-arrow">›</span>
        </div>
      `).join('')}
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-item" style="color:var(--accent)"><span class="si-icon">☆</span> Favoritos</div>
      ${favs.length === 0 ? '<div style="padding:4px 14px;font-size:.7rem;color:var(--text3)">Nenhum favorito</div>' :
        favs.map(s => `<div class="sidebar-item" onclick="closeSidebar();navigate('subpage','${s.id}')"><span class="si-icon">${s.icon}</span> ${s.name}</div>`).join('')}
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-item" style="color:var(--text3)"><span class="si-icon">🗑</span> Lixeira</div>
      ${trashed.length === 0 ? '<div style="padding:4px 14px;font-size:.7rem;color:var(--text3)">Vazia</div>' :
        trashed.map(s => `
          <div class="sidebar-item" style="opacity:.6">
            <span class="si-icon">${s.icon}</span> ${s.name}
            <span style="margin-left:auto;display:flex;gap:4px">
              <button class="small-btn" onclick="event.stopPropagation();restoreSubpage('${s.id}')">↩</button>
              <button class="small-btn" style="color:var(--danger)" onclick="event.stopPropagation();permanentDelete('${s.id}')">✕</button>
            </span>
          </div>
        `).join('')}
    </div>
  `;
}

// ========== BOTTOM NAV ==========
function renderBottomNav() {
  const active = state.subpages.filter(s => !s.deleted);
  const navItems = [
    { id:'home', label:'Início', icon:ICONS.home },
    { id: active[0]?.id, label: active[0]?.name?.split(' ')[0] || 'Beauty', icon:ICONS.beauty },
    { id: active[1]?.id, label: active[1]?.name?.split(' ')[0] || 'Mind', icon:ICONS.mind },
    { id: active[2]?.id, label: active[2]?.name?.split(' ')[0] || 'UGC', icon:ICONS.ugc }
  ];
  document.getElementById('bottomNav').innerHTML = navItems.map(n => {
    const isActive = n.id === 'home' ? state.currentView === 'home' : state.currentSubpage === n.id;
    return `<div class="nav-item ${isActive?'active':''}" onclick="${n.id==='home'?"navigate('home')":"navigate('subpage','"+n.id+"')"}">${n.icon}<span>${n.label}</span></div>`;
  }).join('');
}

// ========== THEME TOGGLE ==========
document.getElementById('themeToggle').addEventListener('click', toggleTheme);

// ========== INIT ==========
loadState();
document.getElementById('themeToggle').innerHTML = state.theme === 'dark' ? ICONS.moon : ICONS.sun;
initSplash();
setTimeout(() => render(), 100);

</script>
</body>
</html>
